<style>
/* =====================================================================
   S6 ENERJİ PANOSU — Tasarım Sistemi (renk.md)
   Primary  #82E600 · Secondary #1D2433 · Tertiary #16445F · Neutral #F1F3F9
   Tipografi: Montserrat (başlık) / Inter (gövde)
   No-scroll (uretim-standardi.md): içerik tek ekrana sığar.
   ===================================================================== */
:root {
  --primary:   #82E600;
  --secondary: #1D2433;
  --tertiary:  #16445F;
  --neutral:   #F1F3F9;
  --white:     #ffffff;
  --muted:     #6b7585;
  --danger:    #e53935;
  --line:      #e2e6f0;

  --radius: 14px;
  --shadow: 0 4px 18px rgba(29, 36, 51, 0.08);
  --font-head: 'Montserrat', sans-serif;
  --font-body: 'Inter', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: var(--font-body);
  background: var(--neutral);
  color: var(--secondary);
  -webkit-font-smoothing: antialiased;
}

/* Tüm uygulama tek viewport'a sığar (No-scroll) */
.app {
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 16px 22px;
  gap: 14px;
  overflow: hidden;
}

/* ---------- HEADER ---------- */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 12px; }
.brand__mark {
  font-size: 26px;
  background: var(--primary);
  color: var(--secondary);
  width: 44px; height: 44px;
  display: grid; place-items: center;
  border-radius: 12px;
}
.brand__title { font-family: var(--font-head); font-size: 20px; font-weight: 700; }
.brand__sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
.header__meta {
  font-size: 12px; color: var(--muted);
  background: var(--white); padding: 8px 14px;
  border-radius: 999px; box-shadow: var(--shadow);
}

/* ---------- SEKMELER (Ekran geçişi) ---------- */
.tabs {
  display: flex; gap: 6px; flex-shrink: 0;
  background: var(--white); padding: 6px;
  border-radius: 12px; box-shadow: var(--shadow);
  width: fit-content;
}
.tab {
  font-family: var(--font-body); font-size: 13px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  border: none; background: transparent;
  padding: 9px 18px; border-radius: 9px;
  transition: all .15s ease;
}
.tab:hover { color: var(--secondary); background: var(--neutral); }
.tab--active { background: var(--secondary); color: var(--white); }

/* ---------- DURUM (loading/empty/error) ---------- */
.state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--muted); font-size: 14px;
}
.state__spinner {
  width: 38px; height: 38px;
  border: 4px solid var(--line);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
.state--error .state__spinner { display: none; }
.state--error p { color: var(--danger); font-weight: 600; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- EKRANLAR ---------- */
.screens { flex: 1; min-height: 0; position: relative; }
.screen {
  position: absolute; inset: 0;
  display: none; flex-direction: column; gap: 14px;
}
.screen--active { display: flex; }

/* ---------- KPI KARTLARI ---------- */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
  flex-shrink: 0;
}
.kpi {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--tertiary);
}
.kpi--primary { border-left-color: var(--primary); }
.kpi__label { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.kpi__value {
  font-family: var(--font-head); font-weight: 700;
  font-size: 26px; color: var(--secondary);
  display: flex; align-items: baseline; gap: 4px;
}
.kpi__unit { font-size: 12px; font-weight: 500; color: var(--muted); }
.kpi--over  .kpi__value { color: var(--danger); }
.kpi--under .kpi__value { color: var(--tertiary); }

/* ---------- PANELLER / GRAFİKLER ---------- */
.panel-row { display: flex; gap: 14px; flex: 1; min-height: 0; }
.panel {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 16px 18px;
  display: flex; flex-direction: column;
  min-height: 0;
}
.panel--wide { flex: 2; }
.panel-row .panel:not(.panel--wide) { flex: 1; }
.panel--full { flex: 1; }
.panel__head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.panel__title {
  font-family: var(--font-head); font-size: 15px; font-weight: 600;
  margin-bottom: 12px;
}
.panel__head .panel__title { margin-bottom: 0; }
.panel__canvas { position: relative; flex: 1; min-height: 0; }
.panel__canvas--tall { min-height: 0; }
.panel__canvas canvas { max-height: 100%; }

/* ---------- ARAMA ÇUBUĞU ---------- */
.search {
  font-family: var(--font-body); font-size: 13px;
  background: var(--neutral);
  border: 1px solid var(--line);
  border-radius: 9px;
  padding: 8px 14px; width: 280px; color: var(--secondary);
  outline: none;
}
.search:focus { border-color: var(--primary); }

/* ---------- DETAY TABLOSU ---------- */
.table-wrap { flex: 1; overflow: auto; margin-top: 12px; border-radius: 10px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead th {
  position: sticky; top: 0; z-index: 1;
  background: var(--secondary); color: var(--white);
  font-weight: 600; text-align: left;
  padding: 11px 14px; cursor: pointer; white-space: nowrap;
  user-select: none;
}
.data-table thead th.num { text-align: right; }
.data-table thead th:hover { background: var(--tertiary); }
.data-table thead th.sort-asc::after  { content: ' ▲'; font-size: 10px; }
.data-table thead th.sort-desc::after { content: ' ▼'; font-size: 10px; }
.data-table tbody td { padding: 9px 14px; border-bottom: 1px solid var(--line); }
.data-table tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table tbody tr:nth-child(even) { background: var(--neutral); }
.data-table tbody tr:hover { background: #eaf7d6; }

/* ---------- FOOTER ---------- */
.footer { flex-shrink: 0; text-align: center; font-size: 11px; color: var(--muted); }

/* ---------- RESPONSIVE ---------- */
@media (max-width: 1100px) {
  .kpi-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 760px) {
  .app { overflow: auto; height: auto; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .panel-row { flex-direction: column; }
}
</style>
